<!DOCTYPE html>
<html>
<head>
<title>VenueVault - Book a Room</title>
</head>
<body>

    <header>
        <h1>VenueVault</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="book-room.html">Book a Room</a>  |
            <a href="admin.html">Admin</a>
        </nav>
    </header>
    
    <main>
        <section>
          <h2>Submit a Booking Request</h2>
          <form>
            <label>Full Name: <input type="text" placeholder="Your name"></label><br><br>
            <label>Email: <input type="email" placeholder="Your @email.com"></label><br><br>
            <label>Phone: <input type="tel" placeholder="Your 10 digit phone number"></label><br><br>
            <label>Date: <input type="date"></label><br><br>
            <label>Time: <input type="time"></label><br><br>
            <label>Purpose:
              <select>
                <option>Lecture</option>
                <option>Meeting</option>
                <option>Workshop</option>
                <option>Exam</option>
                <option>Event</option>
                <option>Seminar</option>
              </select>
            </label><br><br>
            <label>Additional Notes:<br>
                 <textarea rows="4" cols="40" placeholder="Any additional information"></textarea>
            </label><br><br>
            <button type="button">Submit Request</button>
          </form>
        </section>
      </main>

      <footer>
        <p>&copy; 2024 VenueVault - Rooms Booking System.</p>
    </body>
</html>
